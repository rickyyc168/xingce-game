<style>

  @keyframes particleFade {

// Shuffle answers but track correct one
function prepareQuestion(q) {
  const correctText = q.opts[q.ans];
  const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
  return {
    q: q.q,
    opts: shuffled,
    correctIndex: shuffled.indexOf(correctText)
  };
}

function showCategoryMenu() {

function startGame(cat) {
  state.category = cat;
  state.level = 1;
  state.hp = 10;

  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.totalCorrect = 0;
  state.totalWrong = 0;

  document.getElementById('menu-screen').style.display = 'none';

function updateHUD() {
  document.getElementById('level-display').textContent = `第 ${state.level} 关`;
  document.getElementById('hp-bar').style.width = `${(state.hp / state.maxHp) * 100}%`;
  document.getElementById('hp-text').textContent = state.hp;
  document.getElementById('score-display').textContent = `✅ ${state.totalCorrect}`;

  const hpBar = document.getElementById('hp-bar');
  if (state.hp <= 3) {
    hpBar.style.background = 'linear-gradient(90deg, #ff0000, #ff4444)';
  } else if (state.hp <= 6) {
    hpBar.style.background = 'linear-gradient(90deg, #ff8c00, #ffa500)';
  } else {
    hpBar.style.background = 'linear-gradient(90deg, #ff4757, #ff6b81)';
  }
}

function showHudMsg(text, color) {
  const el = document.getElementById('hud-msg');
  el.textContent = text;
  el.style.color = color;
  el.style.opacity = 1;
  setTimeout(() => { el.style.opacity = 0; }, 800);
}

// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      r: Math.random() * 4 + 2,
      color,
      life: 1,
    });
  }
}

// ============================================================
// QUESTIONS & ITEMS
// ============================================================
function spawnNextQuestion() {
  if (state.level > 100) {
    winGame();
    return;
  }

  const bank = QUESTIONS[state.category];
  const rawQ = bank[Math.floor(Math.random() * bank.length)];
  state.currentQ = prepareQuestion(rawQ);

  // Show question
  const qb = document.getElementById('question-box');
  qb.style.display = 'block';
  document.getElementById('question-category').textContent =
    { language: '📖 言语理解', math: '🔢 数量关系', logic: '🧩 判断推理', data: '📊 资料分析', common: '🌍 常识判断' }[state.category];
  document.getElementById('question-text').textContent = state.currentQ.q;

  // Spawn falling items (4 answers at top)
  state.items = [];
  const slotW = canvas.width / 4;
  const indices = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
  for (let i = 0; i < 4; i++) {
    state.items.push({
      x: slotW * i + slotW / 2,
      y: -60 - Math.random() * 80,
      w: slotW - 20,
      h: 44,
      text: state.currentQ.opts[indices[i]],
      isCorrect: indices[i] === state.currentQ.correctIndex,
      speed: state.fallingSpeed + Math.random() * 0.15,
      slot: i,
      active: true,
    });
  }

  state.questionActive = true;
}

function handleCatch(item) {
  if (!state.questionActive) return;
  state.questionActive = false;

  if (item.isCorrect) {
    state.hp = Math.min(state.hp + 1, state.maxHp);
    state.score++;
    state.combo++;
    state.totalCorrect++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    state.fallingSpeed = Math.min(1.2 + state.level * 0.02, 3.5);

    spawnParticles(item.x, item.y, '#7bed9f', 15);
    showHudMsg(state.combo >= 3 ? `+1 ❤️ ${state.combo}连击！` : '+1 ❤️', '#7bed9f');
  } else {
    state.hp -= 5;
    state.combo = 0;
    state.totalWrong++;

    spawnParticles(item.x, item.y, '#ff4757', 20);
    showHudMsg('-5 💀 正确答案是：' + state.currentQ.opts[state.currentQ.correctIndex], '#ff4757');

    if (state.hp <= 0) {
      state.hp = 0;
      updateHUD();
      setTimeout(gameOver, 600);
      return;
    }
  }

  updateHUD();

  // Deactivate all items
  state.items.forEach(it => it.active = false);

  setTimeout(() => {
    if (!state.running) return;
    state.level++;
    document.getElementById('question-box').style.display = 'none';
    updateHUD();
    setTimeout(() => spawnNextQuestion(), 400);
  }, 1200);
}

// ============================================================
// PLAYER DRAW
// ============================================================
function drawPlayer() {
  const p = state.player;
  const cx = p.x + p.w / 2;
  const cy = p.y;

  // Body (graduation cap student)
  ctx.save();

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, canvas.height - 35, 22, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (suit/formal)
  ctx.fillStyle = '#2f3542';
  ctx.beginPath();
  ctx.roundRect(p.x + 8, cy + 20, 24, 24, 4);
  ctx.fill();

  // White shirt
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.roundRect(p.x + 15, cy + 22, 10, 12, 2);
  ctx.fill();

  // Tie
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(cx, cy + 22);
  ctx.lineTo(cx - 3, cy + 32);
  ctx.lineTo(cx, cy + 36);
  ctx.lineTo(cx + 3, cy + 32);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath();
  ctx.arc(cx, cy + 12, 12, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.arc(cx - 4, cy + 10, 2, 0, Math.PI * 2);
  ctx.arc(cx + 4, cy + 10, 2, 0, Math.PI * 2);
  ctx.fill();

  // Smile
  ctx.strokeStyle = '#e17055';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy + 14, 4, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();

  // Graduation cap
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.moveTo(cx - 16, cy + 3);
  ctx.lineTo(cx + 16, cy + 3);
  ctx.lineTo(cx + 12, cy - 2);
  ctx.lineTo(cx - 12, cy - 2);
  ctx.closePath();
  ctx.fill();
  // Cap top
  ctx.fillRect(cx - 14, cy - 5, 28, 4);
  // Tassel
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx + 14, cy - 3);
  ctx.lineTo(cx + 18, cy + 8);
  ctx.stroke();
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(cx + 18, cy + 9, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.fillStyle = '#2f3542';
  ctx.fillRect(p.x + 12, cy + 44, 6, 8);
  ctx.fillRect(p.x + 22, cy + 44, 6, 8);

  // Shoes
  ctx.fillStyle = '#636e72';
  ctx.beginPath();
  ctx.roundRect(p.x + 10, cy + 50, 10, 5, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(p.x + 20, cy + 50, 10, 5, 2);
  ctx.fill();

  // Pencil in hand
  ctx.save();
  ctx.translate(p.x + 32, cy + 28);
  ctx.rotate(-0.3);
  ctx.fillStyle = '#fdcb6e';
  ctx.fillRect(0, 0, 4, 18);
  ctx.fillStyle = '#e17055';
  ctx.fillRect(0, 0, 4, 3);
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.moveTo(0, 18);
  ctx.lineTo(2, 22);
  ctx.lineTo(4, 18);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ============================================================
// ITEM DRAW
// ============================================================
function drawItem(item) {
  if (!item.active) return;

  const cx = item.x;
  const cy = item.y;
  const hw = item.w / 2;

  // Glow
  const glow = item.isCorrect ? 'rgba(123,237,159,0.15)' : 'rgba(255,71,87,0.15)';
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.roundRect(cx - hw - 4, cy - 4, item.w + 8, item.h + 8, 14);
  ctx.fill();

  // Background
  const bg = item.isCorrect
    ? 'rgba(46,213,115,0.25)'
    : 'rgba(255,71,87,0.25)';
  const border = item.isCorrect
    ? 'rgba(46,213,115,0.6)'
    : 'rgba(255,71,87,0.6)';

  ctx.fillStyle = bg;
  ctx.strokeStyle = border;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(cx - hw, cy, item.w, item.h, 12);
  ctx.fill();
  ctx.stroke();

  // Text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px "Noto Sans SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Truncate text if too long
  let text = item.text;
  if (ctx.measureText(text).width > item.w - 16) {
    while (ctx.measureText(text + '…').width > item.w - 16 && text.length > 1) {
      text = text.slice(0, -1);
    }
    text += '…';
  }
  ctx.fillText(text, cx, cy + item.h / 2);
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
function gameLoop(timestamp) {
  if (!state.running) return;

  const dt = Math.min((timestamp - lastTime) / 16.67, 3); // normalize to ~60fps
  lastTime = timestamp;

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0a0e27');
  grad.addColorStop(0.5, '#141852');
  grad.addColorStop(1, '#1a1f4e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  state.bgOffset += 0.3 * dt;
  state.bgStars.forEach(s => {
    s.y += s.speed * dt;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ground
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(0, canvas.height - 35, canvas.width, 35);
  ctx.strokeStyle = 'rgba(255,215,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - 35);
  ctx.lineTo(canvas.width, canvas.height - 35);
  ctx.stroke();

  // Player movement
  const p = state.player;
  const moveLeft = keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['KeyA'] || touchLeft;
  const moveRight = keys['ArrowRight'] || keys['d'] || keys['D'] || keys['KeyD'] || touchRight;
  if (moveLeft) p.x -= p.speed * dt;
  if (moveRight) p.x += p.speed * dt;
  p.x = Math.max(0, Math.min(canvas.width - p.w, p.x));

  // Update items
  if (state.questionActive) {
    state.items.forEach(item => {
      if (!item.active) return;
      item.y += item.speed * dt;

      // Check collision with player
      if (
        item.y + item.h > p.y &&
        item.y < p.y + p.h &&
        item.x + item.w / 2 > p.x &&
        item.x - item.w / 2 < p.x + p.w
      ) {
        handleCatch(item);
      }

      // Off screen = missed
      if (item.y > canvas.height) {
        item.active = false;
        // If correct answer missed, count as wrong-ish, just move on
        if (item.isCorrect && state.questionActive) {
          state.questionActive = false;
          state.hp -= 3;
          state.combo = 0;
          state.totalWrong++;
          spawnParticles(p.x + p.w / 2, p.y, '#ffa502', 12);
          showHudMsg('漏掉了！-3 ❤️', '#ffa502');
          updateHUD();
          if (state.hp <= 0) {
            state.hp = 0;
            updateHUD();
            setTimeout(gameOver, 600);
            return;
          }
          setTimeout(() => {
            if (!state.running) return;
            state.level++;
            document.getElementById('question-box').style.display = 'none';
            updateHUD();
            setTimeout(() => spawnNextQuestion(), 400);
          }, 800);
        }
      }
    });
  }

  // Draw items
  state.items.forEach(drawItem);

  // Draw player
  drawPlayer();

  // Particles
  state.particles = state.particles.filter(pt => {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vy += 0.15;
    pt.life -= 0.025;
    if (pt.life <= 0) return false;
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.r * pt.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return true;
  });

  // Combo display
  if (state.combo >= 2) {
    ctx.save();
    ctx.font = `bold ${14 + state.combo * 2}px "Noto Sans SC", sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillStyle = `rgba(255,215,0,${0.5 + Math.sin(timestamp / 300) * 0.3})`;
    ctx.fillText(`🔥 ${state.combo} 连击`, canvas.width - 20, canvas.height - 50);
    ctx.restore();
  }

  requestAnimationFrame(gameLoop);
}

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r];
    const rad = r[0] || 0;
    this.moveTo(x + rad, y);
    this.arcTo(x + w, y, x + w, y + h, rad);
    this.arcTo(x + w, y + h, x, y + h, rad);
    this.arcTo(x, y + h, x, y, rad);
    this.arcTo(x, y, x + w, y, rad);
    this.closePath();
  };
}

// Init
initStars();
// Draw initial background
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0a0e27');
  grad.addColorStop(0.5, '#141852');
  grad.addColorStop(1, '#1a1f4e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  state.bgStars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}
drawBg();
</script>
